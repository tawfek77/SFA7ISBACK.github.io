<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Notification - NullNext</title>
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        .notification-card {
            width: 500px;
            background: linear-gradient(145deg, #111, #0a0a0a);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-left: 6px solid #0096ff;
            border-radius: 10px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 150, 255, 0.1);
            animation: slideIn 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            position: relative;
        }

        .notification-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(0, 150, 255, 0.05), transparent);
            animation: sweep 3s infinite;
        }

        @keyframes sweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes slideIn {
            0% { transform: translateX(100%) rotateY(-20deg); opacity: 0; }
            100% { transform: translateX(0) rotateY(0deg); opacity: 1; }
        }

        .icon-box {
            background: #0096ff;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.5);
        }

        .icon-box svg {
            width: 30px;
            height: 30px;
            fill: white;
        }

        .content {
            flex: 1;
            text-align: right;
        }

        .player-name {
            display: block;
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            margin-bottom: 5px;
        }

        .status-text {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #0096ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #0096ff;
            width: 100%;
            animation: shrink 5s linear forwards;
            box-shadow: 0 0 10px #0096ff;
        }

        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body>
    <div class="notification-card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div class="content">
            <span class="player-name" id="name">F7LKM</span>
            <span class="status-text">سجل دخوله الآن</span>
        </div>
        <div class="progress-bar"></div>
    </div>

    <script>
        // كود بسيط لتغيير الاسم عبر الرابط إذا أردت
        // مثال: index.html?name=Antigravity
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if (name) {
            document.getElementById('name').innerText = name;
        }
    </script>
</body>
</html>
