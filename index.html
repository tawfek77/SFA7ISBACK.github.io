<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Hunter Notification</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* الخلفية بصورة اللوجو مع تضبيب */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('logo.png') no-repeat center center;
            background-size: cover;
            filter: blur(8px) brightness(0.3);
            z-index: -1;
            transform: scale(1.1);
        }

        .container {
            width: 550px;
            background: rgba(15, 15, 20, 0.9);
            border: 2px solid #cd7f32; /* لون برونزي مثل اللوجو */
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(205, 127, 50, 0.2);
            text-align: center;
            position: relative;
            animation: fadeInScale 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes fadeInScale {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: -100px auto 20px;
            border: 4px solid #cd7f32;
            border-radius: 50%;
            background: #111;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.5);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            color: #fff;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .player-name {
            color: #cd7f32;
            font-size: 24px;
            font-weight: 700;
            display: block;
            margin-bottom: 20px;
        }

        .status {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3);
        }

        .discord-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.5);
            background: #4752c4;
        }

        /* شريط التقدم */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 0 0 20px 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #cd7f32;
            width: 100%;
            animation: shrink 10s linear forwards;
        }

        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* إخفاء مشغل يوتيوب */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="Trigger Hunter Logo">
        </div>
        
        <h1 class="title">Trigger Hunter</h1>
        <span class="player-name" id="p-name">F7LKM</span>
        <p class="status">سجل دخوله الآن إلى السيرفر</p>

        <a href="https://discord.gg/sZ4Vrxgxy7" target="_blank" class="discord-btn">
            <i class="fab fa-discord"></i>
            انضم إلى الديسكورد
        </a>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- مشغل يوتيوب مخفي (يمكنك تغيير رابط الفيديو بالرابط الذي تريده) -->
    <!-- ملاحظة: المتصفحات تمنع الصوت التلقائي إلا بعد تفاعل المستخدم، لذا قد تحتاج للضغط على الصفحة -->
    <iframe id="youtube-player" 
            src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&loop=1&playlist=jfKfPfyJRdk" 
            allow="autoplay">
    </iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if (name) {
            document.getElementById('p-name').innerText = name;
        }
    </script>
</body>
</html>
